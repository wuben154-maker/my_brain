<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my_brain — 点星出摘要 · 审阅稿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e1014;
      font-family: "Noto Sans SC", sans-serif;
    }

    .phone {
      width: 390px;
      height: 844px;
      position: relative;
      overflow: hidden;
      background: #14161c;
      color: #f4f2ef;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 55% at 45% 20%, rgba(155, 140, 255, 0.11), transparent 68%),
        radial-gradient(ellipse 50% 40% at 88% 60%, rgba(123, 140, 255, 0.06), transparent 58%);
      pointer-events: none;
    }

    .status-bar {
      position: relative;
      z-index: 10;
      height: 54px;
      padding: 14px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: "DM Sans", sans-serif;
      font-size: 15px;
      font-weight: 600;
    }

    .status-right { display: flex; gap: 6px; align-items: center; }

    .settings-btn {
      width: 36px;
      height: 36px;
      margin-left: 8px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Pannable star field */
    .star-field-wrap {
      position: relative;
      height: 400px;
      margin-top: 0;
      overflow: hidden;
    }

    .star-field-wrap::before,
    .star-field-wrap::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 48px;
      z-index: 4;
      pointer-events: none;
    }

    .star-field-wrap::before {
      left: 0;
      background: linear-gradient(90deg, #14161c 0%, transparent 100%);
    }

    .star-field-wrap::after {
      right: 0;
      background: linear-gradient(270deg, #14161c 0%, transparent 100%);
    }

    .pan-hint {
      position: absolute;
      top: 8px;
      right: 20px;
      z-index: 5;
      font-size: 12px;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .star-canvas {
      position: absolute;
      left: -24px;
      top: 12px;
      width: 440px;
      height: 360px;
    }

    .star-canvas svg.lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .star-node {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .star-glow {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .star-shape {
      position: relative;
      z-index: 1;
      clip-path: polygon(
        50% 0%, 61% 35%, 98% 35%, 68% 57%,
        79% 91%, 50% 70%, 21% 91%, 32% 57%,
        2% 35%, 39% 35%
      );
      background: linear-gradient(135deg, #fff8f0 0%, #e8e4ff 100%);
    }

    .star-node.dim .star-shape {
      background: linear-gradient(135deg, rgba(244, 242, 239, 0.85) 0%, rgba(155, 163, 180, 0.7) 100%);
    }

    .star-node.warm .star-shape {
      background: linear-gradient(135deg, #ffd4cc 0%, #ff8a7a 100%);
    }

    .star-node.selected .star-shape {
      background: linear-gradient(135deg, #fff 0%, #c4b8ff 50%, #9b8cff 100%);
      filter: drop-shadow(0 0 8px rgba(155, 140, 255, 0.9));
    }

    .star-node.t1 { left: 22%; top: 30%; }
    .star-node.t1 .star-shape { width: 10px; height: 10px; animation: twinkle 3.2s ease-in-out infinite; }
    .star-node.t1 .star-glow { width: 28px; height: 28px; background: radial-gradient(circle, rgba(244,242,239,0.15) 0%, transparent 70%); }

    .star-node.t2 { left: 38%; top: 22%; }
    .star-node.t2 .star-shape { width: 8px; height: 8px; animation: twinkle 4.1s ease-in-out 0.5s infinite; }
    .star-node.t2 .star-glow { width: 22px; height: 22px; background: radial-gradient(circle, rgba(155,163,180,0.12) 0%, transparent 70%); }

    .star-node.t3 { left: 58%; top: 38%; }
    .star-node.t3.selected .star-shape { width: 16px; height: 16px; animation: none; }
    .star-node.t3 .star-glow {
      width: 56px;
      height: 56px;
      background: radial-gradient(circle, rgba(155, 140, 255, 0.35) 0%, rgba(155, 140, 255, 0.08) 45%, transparent 72%);
    }
    .star-node.t3 .ring {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(155, 140, 255, 0.45);
      animation: ringPulse 2.8s ease-in-out infinite;
    }

    .star-node.t4 { left: 72%; top: 28%; }
    .star-node.t4 .star-shape { width: 9px; height: 9px; animation: twinkle 3.6s ease-in-out 1s infinite; }

    .star-node.t5 { left: 48%; top: 58%; }
    .star-node.t5.warm .star-shape { width: 11px; height: 11px; animation: twinkleWarm 3.4s ease-in-out 0.3s infinite; }
    .star-node.t5 .star-glow { width: 32px; height: 32px; background: radial-gradient(circle, rgba(255,138,122,0.2) 0%, transparent 70%); }

    .star-node.t6 { left: 78%; top: 62%; }
    .star-node.t6.dim .star-shape { width: 7px; height: 7px; animation: twinkle 4.5s ease-in-out 1.2s infinite; }

    .star-node.t7 { left: 30%; top: 68%; }
    .star-node.t7 .star-shape { width: 8px; height: 8px; animation: twinkle 3.8s ease-in-out 0.8s infinite; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.55; transform: scale(0.92); }
      50% { opacity: 1; transform: scale(1); }
    }

    @keyframes twinkleWarm {
      0%, 100% { opacity: 0.65; transform: scale(0.94); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    /* Connector from selected star to summary */
    .tap-connector {
      position: absolute;
      left: 58%;
      top: 38%;
      width: 2px;
      height: 52px;
      background: linear-gradient(180deg, rgba(155, 140, 255, 0.5) 0%, rgba(155, 140, 255, 0.15) 100%);
      transform: translateX(-50%);
      z-index: 3;
    }

    /* Node summary card (tap result) */
    .node-summary {
      position: relative;
      z-index: 6;
      margin: 0 20px;
      margin-top: -4px;
      padding: 14px 16px 14px 18px;
      background: rgba(30, 33, 41, 0.96);
      border-radius: 20px;
      border: 1px solid rgba(155, 140, 255, 0.25);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.04),
        0 0 24px rgba(155, 140, 255, 0.08);
    }

    .node-summary::before {
      content: "";
      position: absolute;
      left: 0;
      top: 14px;
      bottom: 14px;
      width: 4px;
      border-radius: 2px;
      background: #9b8cff;
    }

    .summary-eyebrow {
      font-size: 12px;
      color: #9b8cff;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .summary-eyebrow .star-mini {
      width: 8px;
      height: 8px;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      background: #c4b8ff;
    }

    .summary-title {
      font-size: 18px;
      font-weight: 500;
      line-height: 26px;
      color: #f4f2ef;
      margin-bottom: 6px;
    }

    .summary-body {
      font-size: 14px;
      line-height: 22px;
      color: #9ba3b4;
      margin-bottom: 12px;
    }

    .summary-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .summary-cta {
      height: 36px;
      padding: 0 16px;
      border-radius: 18px;
      border: none;
      background: rgba(155, 140, 255, 0.14);
      border: 1px solid rgba(155, 140, 255, 0.28);
      color: #c4b8ff;
      font-family: "Noto Sans SC", sans-serif;
      font-size: 14px;
      font-weight: 500;
    }

    .summary-dismiss {
      font-size: 13px;
      color: #6b7280;
      background: none;
      border: none;
      font-family: "Noto Sans SC", sans-serif;
    }

    /* Adaptive card dimmed when star selected */
    .context-dimmed {
      margin: 12px 20px 0;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(30, 33, 41, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.04);
      opacity: 0.45;
    }

    .context-dimmed .card-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .context-dimmed .card-title {
      font-size: 14px;
      color: #9ba3b4;
    }

    .bottom-zone {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding-bottom: 34px;
      z-index: 8;
    }

    .voice-orb-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 118px;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .voice-orb-glow {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123, 140, 255, 0.28) 0%, transparent 70%);
      animation: orbPulse 2.4s ease-in-out infinite;
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.06); opacity: 1; }
    }

    .voice-orb {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #a8b4ff, #7b8cff 60%, #5a6fd4);
      box-shadow: 0 0 32px rgba(123, 140, 255, 0.4);
      position: relative;
      z-index: 1;
    }

    .voice-state {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #9ba3b4;
      white-space: nowrap;
    }

    .intent-rail {
      position: absolute;
      bottom: 34px;
      left: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
    }

    .intent-pill {
      flex: 1;
      height: 48px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      color: #9ba3b4;
    }

    .intent-pill.suggested {
      background: rgba(123, 140, 255, 0.08);
      border-color: rgba(123, 140, 255, 0.2);
      color: #a8b4ff;
    }
  </style>
</head>
<body>
  <div class="phone" data-screen="constellation-tap-summary">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-right">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#F4F2EF"/><rect x="5" y="2" width="3" height="10" rx="1" fill="#F4F2EF"/><rect x="10" y="0" width="3" height="12" rx="1" fill="#F4F2EF"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3" stroke="#F4F2EF" stroke-opacity="0.5"/><rect x="2" y="2" width="17" height="9" rx="2" fill="#F4F2EF"/></svg>
        <button class="settings-btn" type="button" aria-label="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F4F2EF" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <section class="star-field-wrap" aria-label="可滑动的记忆星座">
      <span class="pan-hint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3"/></svg>
        拖动逛逛
      </span>

      <div class="star-canvas">
        <svg class="lines" aria-hidden="true">
          <line x1="254" y1="148" x2="97" y2="108" stroke="rgba(155,140,255,0.14)" stroke-width="1"/>
          <line x1="254" y1="148" x2="167" y2="79" stroke="rgba(155,140,255,0.12)" stroke-width="1"/>
          <line x1="254" y1="148" x2="317" y2="101" stroke="rgba(155,140,255,0.16)" stroke-width="1"/>
          <line x1="254" y1="148" x2="211" y2="209" stroke="rgba(155,140,255,0.2)" stroke-width="1"/>
          <line x1="254" y1="148" x2="343" y2="223" stroke="rgba(155,140,255,0.1)" stroke-width="1"/>
          <line x1="211" y1="209" x2="132" y2="245" stroke="rgba(123,140,255,0.1)" stroke-width="1"/>
          <line x1="97" y1="108" x2="132" y2="245" stroke="rgba(123,140,255,0.08)" stroke-width="1"/>
        </svg>

        <div class="star-node t1 dim"><div class="star-glow"></div><div class="star-shape"></div></div>
        <div class="star-node t2 dim"><div class="star-glow"></div><div class="star-shape"></div></div>
        <div class="star-node t3 selected">
          <div class="ring"></div>
          <div class="star-glow"></div>
          <div class="star-shape"></div>
        </div>
        <div class="star-node t4"><div class="star-glow"></div><div class="star-shape"></div></div>
        <div class="star-node t5 warm"><div class="star-glow"></div><div class="star-shape"></div></div>
        <div class="star-node t6 dim"><div class="star-glow"></div><div class="star-shape"></div></div>
        <div class="star-node t7"><div class="star-glow"></div><div class="star-shape"></div></div>
      </div>

      <div class="tap-connector" aria-hidden="true"></div>
    </section>

    <article class="node-summary" aria-label="节点摘要">
      <div class="summary-eyebrow">
        <span class="star-mini"></span>
        你点亮的概念
      </div>
      <h2 class="summary-title">Transformer</h2>
      <p class="summary-body">一种用「注意力」处理序列的架构。你上次聊到编码器和解码器，还没展开注意力机制。</p>
      <div class="summary-actions">
        <button class="summary-cta" type="button">多说点</button>
        <button class="summary-dismiss" type="button">收起</button>
      </div>
    </article>

    <div class="context-dimmed" aria-hidden="true">
      <div class="card-label">学习者 · 今天想接着聊</div>
      <div class="card-title">上次聊的概念</div>
    </div>

    <div class="bottom-zone">
      <div class="voice-orb-wrap">
        <span class="voice-state">正在听你说</span>
        <div class="voice-orb-glow"></div>
        <div class="voice-orb" aria-hidden="true"></div>
      </div>
      <div class="intent-rail">
        <button class="intent-pill" type="button">记住这个</button>
        <button class="intent-pill" type="button">先不用</button>
        <button class="intent-pill suggested" type="button">多说点</button>
      </div>
    </div>
  </div>
</body>
</html>
