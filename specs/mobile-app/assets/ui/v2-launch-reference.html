<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my_brain — Launch v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e1014;
      font-family: "Noto Sans SC", sans-serif;
    }

    .phone {
      width: 390px;
      height: 844px;
      position: relative;
      overflow: hidden;
      background: #14161c;
      color: #f4f2ef;
    }

    /* Warm ambient */
    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 38%, rgba(123, 140, 255, 0.12), transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(255, 138, 122, 0.08), transparent 65%),
        radial-gradient(ellipse 50% 35% at 85% 15%, rgba(123, 140, 255, 0.06), transparent 60%);
      pointer-events: none;
    }

    .status-bar {
      position: relative;
      z-index: 2;
      height: 54px;
      padding: 14px 28px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: "DM Sans", sans-serif;
      font-size: 15px;
      font-weight: 600;
    }

    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .status-icons svg { opacity: 0.9; }

    .constellation-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .star-dot {
      position: absolute;
      border-radius: 50%;
      background: #f4f2ef;
      opacity: 0.22;
    }

    .star-dot.s1 { width: 4px; height: 4px; top: 18%; left: 22%; }
    .star-dot.s2 { width: 3px; height: 3px; top: 28%; right: 18%; opacity: 0.15; }
    .star-dot.s3 { width: 5px; height: 5px; top: 62%; left: 14%; opacity: 0.12; }
    .star-dot.s4 { width: 3px; height: 3px; bottom: 32%; right: 24%; opacity: 0.18; }
    .star-dot.s5 { width: 4px; height: 4px; top: 44%; left: 68%; opacity: 0.1; }

    .center-glow {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 138, 122, 0.18) 0%, rgba(123, 140, 255, 0.08) 45%, transparent 70%);
      animation: breathe 3.6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
      50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
    }

    .content {
      position: relative;
      z-index: 1;
      height: calc(100% - 54px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      text-align: center;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      margin-bottom: 28px;
      background: radial-gradient(circle at 35% 35%, #9aa8ff, #7b8cff 55%, #5a6fd4);
      box-shadow:
        0 0 40px rgba(123, 140, 255, 0.35),
        0 0 80px rgba(123, 140, 255, 0.12);
      animation: orbPulse 2.4s ease-in-out infinite;
    }

    @keyframes orbPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(123, 140, 255, 0.35), 0 0 80px rgba(123, 140, 255, 0.12); }
      50% { box-shadow: 0 0 52px rgba(123, 140, 255, 0.45), 0 0 100px rgba(123, 140, 255, 0.18); }
    }

    .brand {
      font-family: "DM Sans", sans-serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #f4f2ef;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 16px;
      line-height: 24px;
      color: #9ba3b4;
      font-weight: 400;
      max-width: 260px;
    }

    .accent-line {
      margin-top: 48px;
      width: 48px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #7b8cff, #ff8a7a);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="phone" data-screen="launch">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#F4F2EF"/><rect x="5" y="2" width="3" height="10" rx="1" fill="#F4F2EF"/><rect x="10" y="0" width="3" height="12" rx="1" fill="#F4F2EF"/><rect x="15" y="1" width="3" height="11" rx="1" fill="#F4F2EF" opacity="0.4"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" fill="#F4F2EF"/><path d="M4.5 7.5a5 5 0 017 0" stroke="#F4F2EF" stroke-width="1.5" stroke-linecap="round"/><path d="M1.5 4.5a9.5 9.5 0 0113 0" stroke="#F4F2EF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3" stroke="#F4F2EF" stroke-opacity="0.5"/><rect x="2" y="2" width="17" height="9" rx="2" fill="#F4F2EF"/><path d="M24 4.5v4a2 2 0 002-2v0a2 2 0 00-2-2z" fill="#F4F2EF" opacity="0.5"/></svg>
      </div>
    </div>

    <div class="constellation-bg">
      <div class="star-dot s1"></div>
      <div class="star-dot s2"></div>
      <div class="star-dot s3"></div>
      <div class="star-dot s4"></div>
      <div class="star-dot s5"></div>
      <div class="center-glow"></div>
    </div>

    <div class="content">
      <div class="logo-mark" aria-hidden="true"></div>
      <h1 class="brand">my_brain</h1>
      <p class="tagline">你的大脑，慢慢亮起来</p>
      <div class="accent-line" aria-hidden="true"></div>
    </div>
  </div>
</body>
</html>
