<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my_brain — Home v2 (empty_invite)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e1014;
      font-family: "Noto Sans SC", sans-serif;
    }

    .phone {
      width: 390px;
      height: 844px;
      position: relative;
      overflow: hidden;
      background: #14161c;
      color: #f4f2ef;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% 22%, rgba(123, 140, 255, 0.1), transparent 65%),
        radial-gradient(ellipse 70% 45% at 80% 70%, rgba(255, 138, 122, 0.06), transparent 60%);
      pointer-events: none;
    }

    .status-bar {
      position: relative;
      z-index: 5;
      height: 54px;
      padding: 14px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: "DM Sans", sans-serif;
      font-size: 15px;
      font-weight: 600;
    }

    .status-right {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .settings-btn {
      width: 36px;
      height: 36px;
      margin-left: 8px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
    }

    .settings-btn svg { opacity: 0.7; }

    /* Constellation field ~45% */
    .constellation {
      position: relative;
      height: 380px;
      margin-top: 8px;
    }

    .constellation-inner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dim-star {
      position: absolute;
      transform: translate(-50%, -50%);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      background: linear-gradient(135deg, rgba(244, 242, 239, 0.5) 0%, rgba(155, 163, 180, 0.35) 100%);
      animation: twinkleDim 4s ease-in-out infinite;
    }

    .dim-star.n1 { top: 28%; left: 26%; width: 7px; height: 7px; }
    .dim-star.n2 { top: 22%; right: 30%; width: 6px; height: 6px; animation-delay: 0.6s; }
    .dim-star.n3 { bottom: 38%; left: 20%; width: 6px; height: 6px; animation-delay: 1.1s; }

    @keyframes twinkleDim {
      0%, 100% { opacity: 0.35; transform: translate(-50%, -50%) scale(0.9); }
      50% { opacity: 0.65; transform: translate(-50%, -50%) scale(1); }
    }

    .pending-star-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pending-halo {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 138, 122, 0.25) 0%, rgba(255, 138, 122, 0.06) 50%, transparent 72%);
      animation: coreBreath 3.6s ease-in-out infinite;
    }

    @keyframes coreBreath {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    .pending-star {
      width: 18px;
      height: 18px;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      background: linear-gradient(135deg, #ffd4cc 0%, #ff8a7a 100%);
      filter: drop-shadow(0 0 12px rgba(255, 138, 122, 0.8)) drop-shadow(0 0 28px rgba(255, 138, 122, 0.35));
      position: relative;
      z-index: 1;
      animation: twinkleWarm 3.4s ease-in-out infinite;
    }

    @keyframes twinkleWarm {
      0%, 100% { opacity: 0.75; transform: scale(0.94); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .invite-block {
      position: relative;
      z-index: 2;
      padding: 0 32px;
      text-align: center;
      margin-top: -8px;
    }

    .invite-block h2 {
      font-size: 28px;
      line-height: 36px;
      font-weight: 500;
      color: #f4f2ef;
      margin-bottom: 12px;
    }

    .invite-block p {
      font-size: 16px;
      line-height: 24px;
      color: #9ba3b4;
      margin-bottom: 24px;
    }

    .cta-start {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      padding: 0 32px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(135deg, #7b8cff 0%, #6a7ae8 100%);
      color: #fff;
      font-family: "Noto Sans SC", sans-serif;
      font-size: 16px;
      font-weight: 500;
      box-shadow:
        0 8px 24px rgba(123, 140, 255, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .bottom-zone {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding-bottom: 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
    }

    .voice-orb-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      margin-bottom: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .voice-orb-glow {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123, 140, 255, 0.28) 0%, transparent 70%);
      animation: orbPulse 2.4s ease-in-out infinite;
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.06); opacity: 1; }
    }

    .voice-orb {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #a8b4ff, #7b8cff 60%, #5a6fd4);
      box-shadow: 0 0 32px rgba(123, 140, 255, 0.4);
      position: relative;
      z-index: 1;
    }

    .orb-hint {
      position: absolute;
      bottom: 100%;
      margin-bottom: 10px;
      font-size: 13px;
      color: #6b7280;
      white-space: nowrap;
    }

    .intent-rail {
      position: absolute;
      bottom: 34px;
      left: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      opacity: 0.35;
      pointer-events: none;
    }

    .intent-pill {
      flex: 1;
      height: 48px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="phone" data-screen="home-empty-invite">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-right">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#F4F2EF"/><rect x="5" y="2" width="3" height="10" rx="1" fill="#F4F2EF"/><rect x="10" y="0" width="3" height="12" rx="1" fill="#F4F2EF"/><rect x="15" y="1" width="3" height="11" rx="1" fill="#F4F2EF" opacity="0.4"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" fill="#F4F2EF"/><path d="M4.5 7.5a5 5 0 017 0" stroke="#F4F2EF" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3" stroke="#F4F2EF" stroke-opacity="0.5"/><rect x="2" y="2" width="17" height="9" rx="2" fill="#F4F2EF"/></svg>
        <button class="settings-btn" type="button" aria-label="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F4F2EF" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </div>

    <section class="constellation" aria-label="记忆星座">
      <div class="dim-star n1"></div>
      <div class="dim-star n2"></div>
      <div class="dim-star n3"></div>
      <div class="constellation-inner">
        <div class="pending-star-wrap">
          <div class="pending-halo"></div>
          <div class="pending-star"></div>
        </div>
      </div>
    </section>

    <section class="invite-block">
      <h2>这里还空着</h2>
      <p>聊几句，我就知道怎么陪你。<br />第一颗星，会来自你的话。</p>
      <button class="cta-start" type="button">开始聊</button>
    </section>

    <div class="bottom-zone">
      <div class="voice-orb-wrap">
        <span class="orb-hint">也可以点这里说话</span>
        <div class="voice-orb-glow"></div>
        <div class="voice-orb" aria-hidden="true"></div>
      </div>
    </div>

    <!-- 冷启动前意图条弱化展示（规格：隐藏或仅开始聊） -->
    <div class="intent-rail" aria-hidden="true">
      <div class="intent-pill">记住这个</div>
      <div class="intent-pill">先不用</div>
      <div class="intent-pill">多说点</div>
    </div>
  </div>
</body>
</html>
