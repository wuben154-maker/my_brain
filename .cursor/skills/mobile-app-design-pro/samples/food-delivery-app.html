<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiteBuddy - Food Delivery App Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Poppins:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #2d1810; font-family: 'Poppins', sans-serif;
    padding: 20px;
  }

  .phone {
    width: 375px; height: 812px; border-radius: 44px; border: 8px solid #111;
    overflow: hidden; position: relative;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
    background: #FFFBEB;
  }

  .dynamic-island {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 32px; border-radius: 20px; background: #000; z-index: 100;
  }

  .status-bar {
    height: 54px; padding: 14px 24px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .status-bar span { font-size: 15px; font-weight: 600; color: #1C1917; }
  .status-icons { display: flex; gap: 5px; }
  .status-icons div { width: 16px; height: 10px; border-radius: 2px; background: #1C1917; }

  .content {
    height: calc(100% - 54px - 90px); overflow-y: auto; overflow-x: hidden;
    padding: 0 20px; scrollbar-width: none;
  }
  .content::-webkit-scrollbar { display: none; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .header-left .loc-label { font-size: 12px; color: #9CA3AF; font-weight: 500; }
  .header-left .loc {
    display: flex; align-items: center; gap: 4px;
    font-size: 15px; font-weight: 600; color: #1C1917; margin-top: 2px;
  }
  .cart-btn {
    width: 44px; height: 44px; border-radius: 14px; background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative;
    border: none; cursor: pointer; transition: transform 150ms ease;
  }
  .cart-btn:active { transform: scale(0.92); }
  .cart-badge {
    position: absolute; top: -4px; right: -4px; width: 20px; height: 20px;
    border-radius: 50%; background: #EF4444; color: #fff; font-size: 11px;
    font-weight: 700; display: flex; align-items: center; justify-content: center;
  }

  .search-bar {
    margin-top: 18px; display: flex; align-items: center; gap: 10px;
    background: #fff; border-radius: 14px; padding: 12px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .search-bar input {
    border: none; outline: none; font-family: 'Poppins'; font-size: 14px;
    color: #1C1917; flex: 1; background: transparent;
  }
  .search-bar input::placeholder { color: #9CA3AF; }

  .promo-banner {
    margin-top: 20px; background: linear-gradient(135deg, #EF4444, #DC2626);
    border-radius: 20px; padding: 20px; color: #fff;
    position: relative; overflow: hidden;
  }
  .promo-banner::before {
    content: ''; position: absolute; top: -20px; right: -10px; width: 120px; height: 120px;
    background: rgba(255,255,255,0.1); border-radius: 50%;
  }
  .promo-banner::after {
    content: ''; position: absolute; bottom: -30px; right: 30px; width: 80px; height: 80px;
    background: rgba(255,255,255,0.06); border-radius: 50%;
  }
  .promo-banner h3 { font-family: 'Baloo 2', cursive; font-size: 22px; position: relative; z-index: 1; }
  .promo-banner p { font-size: 13px; opacity: 0.9; margin-top: 4px; position: relative; z-index: 1; }
  .promo-btn {
    margin-top: 12px; background: #fff; color: #DC2626; border: none;
    padding: 8px 20px; border-radius: 10px; font-weight: 600; font-size: 13px;
    font-family: 'Poppins'; cursor: pointer; position: relative; z-index: 1;
    transition: transform 150ms ease;
  }
  .promo-btn:active { transform: scale(0.95); }

  .categories {
    display: flex; gap: 12px; margin-top: 24px; overflow-x: auto;
    scrollbar-width: none; padding-bottom: 4px;
  }
  .categories::-webkit-scrollbar { display: none; }
  .cat-item {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    min-width: 72px; cursor: pointer; background: none; border: none;
    padding: 8px; transition: transform 150ms ease;
  }
  .cat-item:active { transform: scale(0.92); }
  .cat-icon {
    width: 56px; height: 56px; border-radius: 16px; background: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .cat-item span { font-size: 12px; font-weight: 500; color: #1C1917; }
  .cat-item.active .cat-icon { background: #EF4444; }

  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 28px; margin-bottom: 14px;
  }
  .section-header h2 { font-family: 'Baloo 2', cursive; font-size: 20px; color: #1C1917; }
  .section-header a { font-size: 13px; color: #EF4444; text-decoration: none; font-weight: 600; }

  .restaurant-card {
    background: #fff; border-radius: 16px; overflow: hidden; margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    cursor: pointer; transition: transform 150ms ease;
  }
  .restaurant-card:active { transform: scale(0.98); }
  .restaurant-img {
    height: 140px; position: relative;
    background-size: cover; background-position: center;
  }
  .restaurant-img .tag {
    position: absolute; top: 12px; left: 12px; background: #EF4444; color: #fff;
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 8px;
  }
  .restaurant-img .fav {
    position: absolute; top: 12px; right: 12px; width: 32px; height: 32px;
    border-radius: 50%; background: rgba(255,255,255,0.9); display: flex;
    align-items: center; justify-content: center;
  }
  .restaurant-info { padding: 14px 16px; }
  .restaurant-info h3 { font-size: 16px; font-weight: 600; color: #1C1917; }
  .restaurant-meta {
    display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap;
  }
  .restaurant-meta .rating {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; font-weight: 600; color: #1C1917;
  }
  .restaurant-meta .dot { width: 4px; height: 4px; border-radius: 50%; background: #D1D5DB; }
  .restaurant-meta .detail { font-size: 13px; color: #9CA3AF; }

  .tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 90px;
    background: #fff; border-top: 1px solid #F3F4F6;
    display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; background: none; border: none; padding: 4px 12px;
    transition: transform 150ms ease;
  }
  .tab-item:active { transform: scale(0.9); }
  .tab-item svg { width: 24px; height: 24px; }
  .tab-item span { font-size: 10px; font-weight: 600; }
  .tab-item.active svg { stroke: #EF4444; }
  .tab-item.active span { color: #EF4444; }
  .tab-item:not(.active) svg { stroke: #9CA3AF; }
  .tab-item:not(.active) span { color: #9CA3AF; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeUp 500ms cubic-bezier(0,0,0.2,1) both; }
  .d1 { animation-delay: 60ms; } .d2 { animation-delay: 120ms; }
  .d3 { animation-delay: 180ms; } .d4 { animation-delay: 240ms; }
  .d5 { animation-delay: 300ms; }
</style>
</head>
<body>
<div class="phone">
  <div class="dynamic-island"></div>
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons"><div></div><div></div><div style="width:22px; border-radius:3px;"></div></div>
  </div>

  <div class="content">
    <div class="header animate-in">
      <div class="header-left">
        <div class="loc-label">Deliver to</div>
        <div class="loc">
          <svg width="16" height="16" fill="none" stroke="#EF4444" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          123 Main Street, Apt 4B
          <svg width="14" height="14" fill="none" stroke="#1C1917" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
      <button class="cart-btn">
        <svg width="22" height="22" fill="none" stroke="#1C1917" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <div class="cart-badge">3</div>
      </button>
    </div>

    <div class="search-bar animate-in d1">
      <svg width="18" height="18" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Search for restaurants or dishes...">
    </div>

    <div class="promo-banner animate-in d2">
      <h3>Free Delivery!</h3>
      <p>On your first 3 orders. Use code WELCOME</p>
      <button class="promo-btn">Order Now</button>
    </div>

    <div class="categories animate-in d3">
      <button class="cat-item active"><div class="cat-icon" style="font-size:24px; color: #fff;">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div><span>All</span></button>
      <button class="cat-item"><div class="cat-icon">&#127829;</div><span>Pizza</span></button>
      <button class="cat-item"><div class="cat-icon">&#127828;</div><span>Burgers</span></button>
      <button class="cat-item"><div class="cat-icon">&#127843;</div><span>Sushi</span></button>
      <button class="cat-item"><div class="cat-icon">&#127838;</div><span>Bakery</span></button>
    </div>

    <div class="section-header animate-in d4">
      <h2>Popular Near You</h2>
      <a href="#">See All</a>
    </div>

    <div class="restaurant-card animate-in d4">
      <div class="restaurant-img" style="background: linear-gradient(135deg, #fca5a5 0%, #fecaca 100%);">
        <div class="tag">25-35 min</div>
        <div class="fav">
          <svg width="16" height="16" fill="none" stroke="#EF4444" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </div>
      </div>
      <div class="restaurant-info">
        <h3>Spicy Tuna Poke House</h3>
        <div class="restaurant-meta">
          <div class="rating">
            <svg width="14" height="14" fill="#FBBF24" stroke="#FBBF24" stroke-width="1" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            4.8
          </div>
          <div class="dot"></div>
          <div class="detail">Hawaiian & Asian</div>
          <div class="dot"></div>
          <div class="detail">$14.50 avg</div>
        </div>
      </div>
    </div>

    <div class="restaurant-card animate-in d5">
      <div class="restaurant-img" style="background: linear-gradient(135deg, #fde68a 0%, #fef3c7 100%);">
        <div class="tag">15-25 min</div>
        <div class="fav">
          <svg width="16" height="16" fill="#EF4444" stroke="#EF4444" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </div>
      </div>
      <div class="restaurant-info">
        <h3>Mama Rosa's Italian Kitchen</h3>
        <div class="restaurant-meta">
          <div class="rating">
            <svg width="14" height="14" fill="#FBBF24" stroke="#FBBF24" stroke-width="1" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            4.9
          </div>
          <div class="dot"></div>
          <div class="detail">Italian & Pizza</div>
          <div class="dot"></div>
          <div class="detail">$18.00 avg</div>
        </div>
      </div>
    </div>

    <div style="height: 20px;"></div>
  </div>

  <div class="tab-bar">
    <button class="tab-item active">
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      <span>Home</span>
    </button>
    <button class="tab-item">
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <span>Search</span>
    </button>
    <button class="tab-item">
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      <span>Orders</span>
    </button>
    <button class="tab-item">
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 3a4 4 0 100 8 4 4 0 000-8z"/></svg>
      <span>Profile</span>
    </button>
  </div>
</div>
</body>
</html>
