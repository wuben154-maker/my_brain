name: CI

on:
  push:
    branches: [main]
  pull_request:

# Server-side backstop for the harness gate: even if a local commit bypasses
# Husky (e.g. --no-verify), CI re-runs the full check (typecheck + lint +
# invariant tests) and blocks the merge on red.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify (typecheck + lint + invariant tests)
        run: pnpm check

      - name: Coverage ratchet (logic-layer thresholds)
        run: pnpm coverage
